<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ</title>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝
       タブ＆ベースのCSS 
    ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ */
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 15px;
      color: #333;
    }
    .card {
      background: #ffffff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .tab-menu {
      display: flex;
      border-bottom: 2px solid #eeeeee;
      margin-bottom: 20px;
    }
    .tab-button {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: none;
      cursor: pointer;
      font-weight: bold;
      color: #999999;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    .tab-button.active {
      color: #00b5ad; /* 医院様のテーマカラー */
      border-bottom: 3px solid #00b5ad;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="tab-menu">
    <button class="tab-button active" onclick="switchTab('main-tab', this)">チケット・処方箋</button>
    <button class="tab-button" onclick="switchTab('gbt-tab', this)">GBT記録</button>
  </div>

  <div id="main-tab" class="tab-content active">
    <div id="ticket-container"></div>
    <div id="prescription-container"></div>
    </div>

  <div id="gbt-tab" class="tab-content">
    <div class="card" id="gbt-container">
      
      <div id="gbt-empty-message" style="display: none; text-align: center; padding: 30px 0; color: #999;">
        まだGBTの記録がありません。<br>初回のメンテナンスをお待ちしております！
      </div>

      <div id="gbt-data-area" style="display: none; text-align: center;">
        <h3 style="color: #00b5ad; margin-top: 0;">✨ GBT プロフェッショナルケア</h3>
        <div style="margin: 15px 0;">
          <p style="margin: 0; color: #666; font-size: 14px;">現在の通院回数</p>
          <div style="font-size: 32px; font-weight: bold; color: #333;">
            <span id="gbt-count-number">0</span> <span style="font-size: 18px;">回</span>
          </div>
          <p id="gbt-message" style="margin: 5px 0 0 0; font-size: 14px; font-weight: bold; color: #e83e8c;"></p>
        </div>
        <div style="text-align: left; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ccc;">
          <p style="margin: 0 0 10px 0; font-weight: bold; color: #555;">📅 メンテナンス履歴</p>
          <ul id="gbt-history-list" style="list-style-type: none; padding: 0; margin: 0; font-size: 14px; color: #555;"></ul>
        </div>
      </div>

    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxXd8NMotfbSP-uZMMNYtOYiKHmxu4v1X2qogZqhn8oLE3HOD5G2nLdYGGXnYZHLB4O/exec';
    const LIFF_ID = '2010364442-cKVekudo';

    // ------------------------------------------
    // 1. LIFF初期化とデータ取得の流れ
    // ------------------------------------------
    window.onload = function() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (liff.isLoggedIn()) {
            liff.getProfile().then(profile => {
              fetchDataFromGAS(profile.userId, profile.displayName);
            });
          } else {
            liff.login();
          }
        })
        .catch(err => console.error('LIFF初期化エラー', err));
    };

    function fetchDataFromGAS(userId, displayName) {
      // GASへ送るデータ
      const payload = {
        action: 'getTickets',
        userId: userId,
        displayName: displayName
      };

      fetch(GAS_URL, {
        method: 'POST',
        // ※以前のGASの受け取り方に合わせています（JSON.stringifyの場合とx-www-form-urlencodedの場合があります）
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          
          // ▼▼▼ 今までのチケット・処方箋の描画関数を呼び出す ▼▼▼
          // 例: 
          // renderTickets(data.tickets);
          // renderPrescriptions(data.prescriptions);
          // ▲▲▲ 今までのチケット・処方箋の描画関数を呼び出す ▲▲▲
          
          // ★ 今回追加したGBTの描画処理をここで呼び出します！ ★
          if (data.gbt) {
            renderGbt(data.gbt);
          }

        }
      })
      .catch(error => console.error('データ取得エラー:', error));
    }


    // ------------------------------------------
    // 2. タブ切り替え処理
    // ------------------------------------------
    function switchTab(tabId, clickedButton) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      clickedButton.classList.add('active');
    }

    // ------------------------------------------
    // 3. GBTデータの描画とお祝いアニメーション
    // ------------------------------------------
    function renderGbt(gbtData) {
      const emptyMsgEl = document.getElementById('gbt-empty-message');
      const dataAreaEl = document.getElementById('gbt-data-area');

      // 記録が0回の場合
      if (!gbtData || gbtData.count === 0) {
        emptyMsgEl.style.display = 'block';
        dataAreaEl.style.display = 'none';
        return;
      }
      
      // 記録が1回以上の場合
      emptyMsgEl.style.display = 'none';
      dataAreaEl.style.display = 'block';

      document.getElementById('gbt-count-number').innerText = gbtData.count;

      const nextGoal = Math.ceil((gbtData.count + 0.1) / 5) * 5; 
      const remain = nextGoal - gbtData.count;
      const msgEl = document.getElementById('gbt-message');
      
      if (gbtData.count % 5 === 0) {
        msgEl.innerText = `素晴らしい継続です！${gbtData.count}回目の記念日ですね🎉`;
      } else {
        msgEl.innerText = `次の目標（${nextGoal}回目）まであと ${remain} 回！`;
      }

      const listEl = document.getElementById('gbt-history-list');
      listEl.innerHTML = '';
      gbtData.logs.forEach(log => {
        const li = document.createElement('li');
        li.style.padding = '5px 0';
        li.style.borderBottom = '1px solid #eee';
        li.innerText = `✅ ${log.date} （${log.session_number}回目）`;
        listEl.appendChild(li);
      });

      // 5の倍数で、まだ祝っていない場合のみ紙吹雪を降らせる
      if (gbtData.count > 0 && gbtData.count % 5 === 0) {
        const storageKey = 'gbt_celebrated_' + gbtData.count;
        if (!localStorage.getItem(storageKey)) {
          fireConfetti();
          localStorage.setItem(storageKey, 'true'); 
        }
      }
    }

    // ------------------------------------------
    // 4. 紙吹雪を降らせる関数
    // ------------------------------------------
    function fireConfetti() {
      var duration = 4 * 1000;
      var animationEnd = Date.now() + duration;
      var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) {
          return clearInterval(interval);
        }
        var particleCount = 50 * (timeLeft / duration);
        
        confetti(Object.assign({}, defaults, { particleCount,
          origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
        }));
        confetti(Object.assign({}, defaults, { particleCount,
          origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
        }));
      }, 250);
    }

    document.addEventListener("DOMContentLoaded", () => {
      // ★URLの末尾（?page=goods など）を読み取って、最初に開く画面を決める
      const urlParams = new URLSearchParams(window.location.search);
      const startPage = urlParams.get('page'); 
      if (startPage === 'goods') {
        switchView('goods'); // リッチメニューから「グッズ」を指定されたらグッズ画面を開く
      }

      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) { liff.login(); } 
          else { fetchTickets(); }
        })
        .catch((err) => {
          console.error('LIFF Initialization failed', err);
          document.getElementById('loading').innerText = 'エラーが発生しました';
        });
    });

    // ★画面切り替え機能
    function switchView(viewName) {
      if (viewName === 'goods') {
        document.getElementById('view-ticket').style.display = 'none';
        document.getElementById('view-goods').style.display = 'block';
        document.getElementById('tab-ticket').classList.remove('active');
        document.getElementById('tab-goods').classList.add('active');
      } else {
        document.getElementById('view-ticket').style.display = 'block';
        document.getElementById('view-goods').style.display = 'none';
        document.getElementById('tab-ticket').classList.add('active');
        document.getElementById('tab-goods').classList.remove('active');
      }
    }

    function fetchTickets() {
      const idToken = liff.getIDToken(); 
      const payload = { action: 'getTickets', idToken: idToken };

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app-content').style.display = 'block'; // ロード後に画面を表示

        if (data.error) { alert(data.error); return; }
        
        renderTickets(data.tickets);
        renderPrescriptions(data.prescriptions);
        renderHistory(data.history); 
      })
      .catch(error => {
        console.error(error);
        document.getElementById('loading').innerText = 'データの取得に失敗しました';
      });
    }

    function renderTickets(tickets) {
      const listDiv = document.getElementById('ticket-list');
      listDiv.innerHTML = ''; 
      if (!tickets || tickets.length === 0) {
        listDiv.innerHTML = '<p style="color:#888; font-size: 0.9rem;">現在使用できるチケットはありません。</p>';
        return;
      }
      tickets.forEach(ticket => {
        let noteHtml = '';
        if (ticket.interval_days > 0) noteHtml += `<div style="color: #c0392b; font-size: 0.85rem; margin-bottom: 3px; font-weight: bold;">※前回利用から ${ticket.interval_days} 日間は利用不可</div>`;
        if (ticket.monthly_limit > 0) noteHtml += `<div style="color: #c0392b; font-size: 0.85rem; margin-bottom: 3px; font-weight: bold;">※同月内の利用は ${ticket.monthly_limit} 回まで</div>`;

        const card = document.createElement('div');
        card.className = 'ticket-card';
        card.innerHTML = `
          <div class="ticket-title">${ticket.title}</div>
          <div class="ticket-expiry">有効期限: ${ticket.expiry_date}</div>
          ${noteHtml}
          <button class="use-btn" style="margin-top: 10px;" onclick="openPinModal('${ticket.ticket_id}')">使用する</button>
        `;
        listDiv.appendChild(card);
      });
    }
    
    function renderPrescriptions(prescriptions) {
      const listDiv = document.getElementById('prescription-list');
      listDiv.innerHTML = ''; 
      if (!prescriptions || prescriptions.length === 0) {
        listDiv.innerHTML = '<p style="color:#888; font-size: 0.9rem;">現在、処方されているグッズはありません。</p>';
        return;
      }
      prescriptions.forEach(group => {
        const card = document.createElement('div');
        card.className = 'prescription-card';
        let itemsHtml = '';
        group.items.forEach(item => {
          let commentHtml = item.staff_comment ? `<div class="staff-comment">💬 ${item.staff_comment}</div>` : '';
          itemsHtml += `
            <div class="goods-item">
              <div class="goods-name">🦷 ${item.goods_name}</div>
              <div class="goods-desc">${item.description}</div>
              ${commentHtml}
            </div>
          `;
        });
        card.innerHTML = `<div class="prescription-date">📅 処方日: ${group.prescribed_at}</div>${itemsHtml}`;
        listDiv.appendChild(card);
      });
    }

    function renderHistory(history) {
      const listDiv = document.getElementById('history-list');
      listDiv.innerHTML = ''; 
      if (!history || history.length === 0) {
        listDiv.innerHTML = '<p style="color:#888; font-size: 0.9rem;">まだ利用履歴はありません。</p>';
        return;
      }
      history.forEach(item => {
        const card = document.createElement('div');
        card.className = 'history-card';
        card.innerHTML = `<div class="history-title">${item.title}</div><div>使用日時: ${item.used_at}</div>`;
        listDiv.appendChild(card);
      });
    }

    // --- ポップアップの制御処理 ---
    let currentTicketId = null;
    function openPinModal(ticketId) {
      currentTicketId = ticketId;
      document.getElementById('pin-input').value = ''; 
      document.getElementById('pin-modal').style.display = 'flex'; 
      document.getElementById('pin-input').focus(); 
    }
    function closePinModal() { document.getElementById('pin-modal').style.display = 'none'; currentTicketId = null; }
    function confirmPin() {
      const STAFF_PIN = '1234'; 
      const userInput = document.getElementById('pin-input').value;
      if (userInput !== STAFF_PIN) { alert('暗証番号が間違っています。'); return; }

      const requestTicketId = currentTicketId;
      closePinModal();
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').innerText = '消込処理中...';
      document.getElementById('app-content').style.display = 'none';

      const idToken = liff.getIDToken();
      fetch(GAS_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'useTicket', idToken: idToken, ticketId: requestTicketId })
      })
      .then(response => response.json())
      .then(data => {
        if (data.error) { alert(data.error); document.getElementById('loading').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; return; }
        alert('チケットを使用しました！');
        document.getElementById('loading').innerText = '画面を更新しています...';
        fetchTickets(); 
      })
      .catch(error => { console.error(error); alert('通信エラーが発生しました'); document.getElementById('loading').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; });
    }
  </script>
</body>
</html>
