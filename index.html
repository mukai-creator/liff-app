<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診察券アプリ</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #fcf4f6; /* 背景もほんのりピンクがかった色に変更 */ padding: 20px; }
    h1 { font-size: 1.2rem; color: #e6437b; /* 見出しをテーマカラーに */ }
    
    /* アクティブなチケットのデザイン */
    .ticket-card {
      background: #fff; 
      border-radius: 8px; 
      padding: 15px;
      margin-bottom: 15px; 
      box-shadow: 0 2px 8px rgba(230, 67, 123, 0.15); /* 影にも少しテーマカラーを混ぜて馴染ませる */
      border-top: 5px solid #e6437b; /* 上部にテーマカラーの太線を引く */
    }
    .ticket-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; color: #333; }
    .ticket-expiry { color: #888; font-size: 0.9rem; margin-bottom: 15px; }
    .use-btn {
      background-color: #e6437b; /* ボタンをテーマカラーに */
      color: white; border: none;
      padding: 10px 15px; border-radius: 4px; width: 100%;
      font-size: 1rem; cursor: pointer;
      font-weight: bold;
    }
    
    /* 使用済み履歴のデザイン */
    .history-card {
      background: #fff; border-radius: 8px; padding: 12px 15px;
      margin-bottom: 10px; color: #999; font-size: 0.9rem;
      border-left: 4px solid #ccc; /* 履歴は控えめなグレーライン */
    }
    .history-title { font-weight: bold; margin-bottom: 5px; color: #666; }
    
    #loading { text-align: center; color: #e6437b; margin-top: 20px; font-weight: bold; }

    /* パスワード入力用ポップアップのデザイン */
    #pin-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: #fff; padding: 20px; border-radius: 8px;
      width: 80%; max-width: 300px; text-align: center;
    }
    .modal-content p { font-size: 0.9rem; margin-bottom: 15px; color: #333; }
    #pin-input {
      font-size: 1.5rem; width: 120px; text-align: center; letter-spacing: 5px;
      padding: 10px; margin-bottom: 20px; border: 2px solid #f0b4c8; /* 枠線を薄いピンクに */
      border-radius: 4px; outline: none;
    }
    #pin-input:focus {
      border-color: #e6437b; /* 入力中は濃いピンクに */
    }
    .modal-buttons { display: flex; justify-content: space-between; }
    .btn-cancel { background: #bbb; color: white; border: none; padding: 10px; border-radius: 4px; width: 45%; cursor: pointer; font-weight: bold;}
    .btn-confirm { background: #e6437b; color: white; border: none; padding: 10px; border-radius: 4px; width: 45%; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <h1>保有しているチケット</h1>
  <div id="loading">読み込み中...</div>
  <div id="ticket-list"></div>

  <h1 style="margin-top: 30px; border-top: 2px dashed #f0b4c8; padding-top: 20px;">利用履歴</h1>
  <div id="history-list"></div>

  <div id="pin-modal">
    <div class="modal-content">
      <p>【スタッフ専用】<br>消込のための4桁の暗証番号を入力してください。</p>
      <input type="text" id="pin-input" inputmode="numeric" pattern="\d*" maxlength="4" placeholder="----">
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closePinModal()">キャンセル</button>
        <button class="btn-confirm" onclick="confirmPin()">消込する</button>
      </div>
    </div>
  </div>

  <script>
    // ★ご自身のURL・IDが入っているか念のため確認してください
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxXd8NMotfbSP-uZMMNYtOYiKHmxu4v1X2qogZqhn8oLE3HOD5G2nLdYGGXnYZHLB4O/exec';
    const LIFF_ID = '2010364442-cKVekudo';

    document.addEventListener("DOMContentLoaded", () => {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) { liff.login(); } 
          else { fetchTickets(); }
        })
        .catch((err) => {
          console.error('LIFF Initialization failed', err);
          document.getElementById('loading').innerText = 'エラーが発生しました';
        });
    });

    function fetchTickets() {
      const idToken = liff.getIDToken(); 
      const payload = { action: 'getTickets', idToken: idToken };

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        if (data.error) {
          alert(data.error);
          return;
        }
        
        // ★保有チケットと履歴の両方を画面に描画する
        renderTickets(data.tickets);
        renderHistory(data.history); 
      })
      .catch(error => {
        console.error(error);
        document.getElementById('loading').innerText = 'データの取得に失敗しました';
      });
    }

    // 保有チケットの描画
    function renderTickets(tickets) {
      const listDiv = document.getElementById('ticket-list');
      listDiv.innerHTML = ''; 

      if (tickets.length === 0) {
        listDiv.innerHTML = '<p style="color:#888; font-size: 0.9rem;">現在使用できるチケットはありません。</p>';
        return;
      }

      tickets.forEach(ticket => {
        // 制限がある場合、注意書きのHTMLを生成する（文字色も統一感を出すため少し赤みの強い色に調整）
        let noteHtml = '';
        if (ticket.interval_days > 0) {
          noteHtml += `<div style="color: #c0392b; font-size: 0.85rem; margin-bottom: 3px; font-weight: bold;">※前回利用から ${ticket.interval_days} 日間は利用不可</div>`;
        }
        if (ticket.monthly_limit > 0) {
          noteHtml += `<div style="color: #c0392b; font-size: 0.85rem; margin-bottom: 3px; font-weight: bold;">※同月内の利用は ${ticket.monthly_limit} 回まで</div>`;
        }

        const card = document.createElement('div');
        card.className = 'ticket-card';
        card.innerHTML = `
          <div class="ticket-title">${ticket.title}</div>
          <div class="ticket-expiry">有効期限: ${ticket.expiry_date}</div>
          ${noteHtml}  <button class="use-btn" style="margin-top: 10px;" onclick="openPinModal('${ticket.ticket_id}')">使用する</button>
        `;
        listDiv.appendChild(card);
      });
    }
    
    // 利用履歴の描画関数
    function renderHistory(history) {
      const historyDiv = document.getElementById('history-list');
      historyDiv.innerHTML = ''; 

      if (history.length === 0) {
        historyDiv.innerHTML = '<p style="color:#888; font-size: 0.9rem;">まだ利用履歴はありません。</p>';
        return;
      }

      history.forEach(item => {
        const card = document.createElement('div');
        card.className = 'history-card';
        card.innerHTML = `
          <div class="history-title">${item.title}</div>
          <div>使用日時: ${item.used_at}</div>
        `;
        historyDiv.appendChild(card);
      });
    }

    // --- ポップアップの制御処理 ---
    let currentTicketId = null;

    function openPinModal(ticketId) {
      currentTicketId = ticketId;
      document.getElementById('pin-input').value = ''; 
      document.getElementById('pin-modal').style.display = 'flex'; 
      document.getElementById('pin-input').focus(); 
    }

    function closePinModal() {
      document.getElementById('pin-modal').style.display = 'none';
      currentTicketId = null;
    }

    function confirmPin() {
      const STAFF_PIN = '1234'; // ★ここを医院の暗証番号に変更してください
      const userInput = document.getElementById('pin-input').value;

      if (userInput !== STAFF_PIN) {
        alert('暗証番号が間違っています。');
        return;
      }

      const requestTicketId = currentTicketId;
      closePinModal();

      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').innerText = '消込処理中...';

      const idToken = liff.getIDToken();
      const payload = {
        action: 'useTicket',
        idToken: idToken,
        ticketId: requestTicketId
      };

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        if (data.error) {
          alert(data.error);
          document.getElementById('loading').style.display = 'none';
          return;
        }
        
        alert('チケットを使用しました！');
        document.getElementById('loading').innerText = '画面を更新しています...';
        fetchTickets(); // 画面を更新すると、チケットが消えて履歴側に移動します！
      })
      .catch(error => {
        console.error(error);
        alert('通信エラーが発生しました');
        document.getElementById('loading').style.display = 'none';
      });
    }
  </script>
</body>
</html>
